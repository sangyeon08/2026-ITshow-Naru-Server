services:
  api:
    build: .
    ports:
      - "3003:3003"
    env_file:
      - .env
    environment:
      - PORT=3003
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
